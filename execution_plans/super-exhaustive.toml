[tier]
name = "super-exhaustive"
description = "Everything in exhaustive plus infrastructure audits (check-config, dead-code, observability, schema-validation, secret-leakage, feature-flags, fixture-drift) and a final meta-review that writes recommendations for checks to consider next. Meant for occasional deep audits, not every run. Note: migration-safety is available as an on-demand check (--checks migration-safety) for projects with SQL/relational migrations, but is not included in any default plan."

