name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb # v5.4.1

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Type check
        run: uv run python -m mypy src/checkloop

      - name: Run tests
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "=== Starting pytest ==="
          uv run python -m pytest tests/ -x -v -s --timeout=30 --timeout-method=thread 2>&1
          echo "=== pytest finished with exit code $? ==="

      - name: Verify CLI entry point
        run: uv run checkloop --help

      - name: Dry run
        run: uv run checkloop --dir . --dry-run
